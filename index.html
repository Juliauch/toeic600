<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TOEIC 600 單字學習</title>
  <style>
    :root {
      --primary: #3182ce;
      --secondary: #48bb78;
      --note-color: #805ad5;
      --bg: #f7fafc;
    }
    body { font-family:"PingFang TC","Microsoft JhengHei",sans-serif; margin:0; background:var(--bg); color:#2d3748; }
    header { text-align:center; padding:20px; background:white; box-shadow:0 2px 10px rgba(0,0,0,.05); }
    header h1 { margin:0; font-size:22px; color:#1a365d; }
    header p  { margin:6px 0 0; font-size:13px; color:#718096; }
    .nav-container { background:white; padding:12px 15px; display:flex; justify-content:center; flex-wrap:wrap; gap:8px; border-bottom:1px solid #e2e8f0; }
    .nav-btn { padding:8px 20px; cursor:pointer; border:2px solid var(--primary); border-radius:30px; background:white; color:var(--primary); font-weight:bold; font-size:13px; transition:.2s; font-family:inherit; }
    .nav-btn:hover { background:#ebf8ff; }
    .nav-btn.active { background:var(--primary); color:white; }
    .main-container { max-width:1400px; margin:0 auto; padding:20px; }
    .lesson-content { display:none; gap:20px; }
    .lesson-content.active { display:flex; }
    .column { flex:1; min-width:0; }
    .column-header { font-size:18px; font-weight:bold; padding:15px; border-radius:10px; margin-bottom:20px; text-align:center; }
    .textbook-header { background:#ebf8ff; color:var(--primary); border:1px solid #bee3f8; }
    .notes-header    { background:#faf5ff; color:var(--note-color); border:1px solid #e9d8fd; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,.05); border:1px solid #edf2f7; }
    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:10px; }
    .word      { font-size:22px; font-weight:800; color:#1a365d; }
    .word-note { color:#44337a; }
    .pos { display:inline-block; font-size:12px; background:var(--primary); color:white; padding:1px 6px; border-radius:3px; margin-left:5px; vertical-align:middle; font-weight:600; }
    .trans      { font-size:16px; color:#4a5568; font-weight:600; margin-top:5px; }
    .trans-note { color:#6b46c1; }
    .ori-def      { font-size:16px; color:#4a5568; font-weight:600; margin-top:5px; }
    .ori-def-note { color:#6b46c1; }
    .def-box { background:#f7fafc; padding:10px 12px; border-left:4px solid var(--primary); margin:10px 0; font-size:14px; display:flex; justify-content:space-between; align-items:center; gap:10px; line-height:1.5; }
    .note-def-box { border-left-color:var(--note-color); background:#fffaf0; }
    .def-text { flex:1; }
    .family-tags { display:flex; flex-wrap:wrap; gap:5px; margin:8px 0 4px; }
    .ftag { font-size:11px; padding:3px 9px; border-radius:3px; font-weight:600; display:flex; align-items:center; gap:4px; }
    .ftag-label { opacity:.65; font-size:10px; }
    .ftag-v   { background:#ebf8ff; color:#2b6cb0; border:1px solid #bee3f8; }
    .ftag-n   { background:#f0fff4; color:#276749; border:1px solid #9ae6b4; }
    .ftag-a   { background:#fffbeb; color:#744210; border:1px solid #f6e05e; }
    .ftag-adv { background:#faf5ff; color:#553c9a; border:1px solid #d6bcfa; }
    .ex-item { font-size:14px; margin-top:10px; padding-top:10px; border-top:1px dashed #e2e8f0; }
    .ex-en   { display:flex; justify-content:space-between; gap:10px; line-height:1.5; color:#2d3748; }
    .ex-en span { flex:1; font-style:italic; }
    .play-btn { background:var(--secondary); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px; flex-shrink:0; transition:.15s; white-space:nowrap; font-family:inherit; }
    .play-btn:hover { filter:brightness(.9); }
    .play-btn.playing { background:#e53e3e; }
    @media(max-width:800px){ .lesson-content.active{flex-direction:column;} }
  </style>
</head>
<body>
<header>
  <h1>📘 TOEIC 600 單字學習</h1>
  <p>左欄：核心單字完整對照　／　右欄：衍生詞家族變化</p>
</header>
<div class="nav-container" id="lesson-nav"></div>
<div class="main-container" id="main-container"></div>
<script>
// grab data from JSON file generated by the Python script (or you can host it yourself)
fetch('./data/toeic600/toeic600.json')
  .then(res => res.json())
  .then(DATA => {
    render(DATA);
  })
  .catch(err => {
    document.body.innerHTML = `<p style="color:red;padding:20px">載入資料失敗：${err.message}</p>`;
  });

let curU = null, curB = null;
let ttsReady = false;

function ensureVoices() {
  return new Promise(resolve => {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) { resolve(voices); return; }
    window.speechSynthesis.addEventListener('voiceschanged', () => {
      resolve(window.speechSynthesis.getVoices());
    }, { once: true });
  });
}

window.addEventListener('load', () => {
  ensureVoices().then(() => { ttsReady = true; });
});

function speak(text, btn) {
  if (curU) {
    window.speechSynthesis.cancel();
    if (curB) { curB.classList.remove('playing'); curB.textContent = curB._orig; }
    if (curB === btn) { curU = null; curB = null; return; }
  }
  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                    voices.find(v => v.lang.startsWith('en'));
    if (enVoice) u.voice = enVoice;
    btn._orig = btn.textContent;
    u.onstart = () => { btn.classList.add('playing'); btn.textContent = '⏹ 停止'; };
    u.onend = u.onerror = () => { btn.classList.remove('playing'); btn.textContent = btn._orig; curU = null; curB = null; };
    curU = u; curB = btn;
    window.speechSynthesis.speak(u);
  };
  if (ttsReady) { doSpeak(); }
  else { ensureVoices().then(() => { ttsReady = true; doSpeak(); }); }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function posFromZh(zh) {
  const m = (zh||'').match(/^(動|名|形|副)/);
  return m ? {'動':'v.','名':'n.','形':'adj.','副':'adv.'}[m[1]] : '';
}

function createCoreCard(item) {
  const pos = posFromZh(item['Chinese Definition']);
  const w  = esc(item.Vocabulary||'');
  const en = esc(item['English Definition']||'');
  const zh = esc(item['Chinese Definition']||'');
  const ex = esc(item['Example Sentence']||'');
  return `
  <div class="card">
    <div class="card-header">
      <div>
        <span class="word">${w}</span>${pos ? `<span class="pos">${pos}</span>` : ''}
        <div class="trans">${zh}</div>
        <div class="en-en">
          <span class="ori-def">${en}</span>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; gap:5px; flex-shrink:0;">
      <button class="play-btn tts-word" data-text="${w}">🔊 唸單字</button>
      <button class="play-btn tts-en" data-text="${en}">🔊 唸解釋</button>
    </div>
    </div>
    <div class="ex-item">
      <div class="ex-en">
        <span>• ${ex}</span>
        <button class="play-btn tts-ex" data-text="${ex}">🔊 唸例句</button>
      </div>
    </div>
  </div>`;
}
function createFamilyCard(item) {
  const raw = item['Core Word (EN/ZH)']||'';
  const pi  = raw.indexOf('(');
  const cEn = esc(pi>-1 ? raw.slice(0,pi).trim() : raw);
  const cZh = esc(pi>-1 ? raw.slice(pi) : '');
  const verb=item['Verb (動詞)']||'', noun=item['Noun (名詞)']||'';
  const adj =item['Adjective (形容詞)']||'', adv=item['Adverb (副詞)']||'';
  const ex  = esc(item['Example Sentence']||'');

  // 每個變化詞都包一個可點播的 tag
  function makeTag(cls, label, word) {
    if (!word || word === 'N/A') return '';
    return `<span class="ftag ${cls}">
      <span class="ftag-label">${label}</span>
      ${esc(word)}
      <button class="play-btn tts-word"
              style="background:var(--note-color);padding:2px 5px;font-size:10px;margin-left:4px"
              data-text="${esc(word)}">🔊</button>
    </span>`;
  }

  const tags = [
    makeTag('ftag-v',   '動', verb),
    makeTag('ftag-n',   '名', noun),
    makeTag('ftag-a',   '形', adj),
    makeTag('ftag-adv', '副', adv),
  ].join('');

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <span class="word word-note">${cEn}</span>
        <div class="trans trans-note">${cZh}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
        <button class="play-btn tts-word" style="background:var(--note-color)" data-text="${cEn}">🔊 唸單字</button>
        <button class="play-btn tts-ex"   style="background:var(--note-color)" data-text="${ex}">🔊 唸例句</button>
      </div>
    </div>
    ${tags ? `<div class="family-tags">${tags}</div>` : ''}
    <div class="def-box note-def-box">
      <span class="def-text"><strong>例句：</strong>${ex}</span>
    </div>
  </div>`;
}

function render(DATA) {
  const nav = document.getElementById('lesson-nav');
  const con = document.getElementById('main-container');
  const keys = Object.keys(DATA).sort((a,b)=>parseInt(a.replace(/\D/g,''))-parseInt(b.replace(/\D/g,'')));
  keys.forEach((key, idx) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn'+(idx===0?' active':'');
    btn.textContent = key;
    btn.addEventListener('click', ()=>showLesson(key, btn));
    nav.appendChild(btn);
    const lesson = DATA[key];
    const div = document.createElement('div');
    div.id = 'lesson-'+key.replace(/ /g,'-');
    div.className = 'lesson-content'+(idx===0?' active':'');
    div.innerHTML = `
      <div class="column">
        <div class="column-header textbook-header">📖 核心單字完整對照</div>
        ${(lesson.core||[]).map(createCoreCard).join('')}
      </div>
      <div class="column">
        <div class="column-header notes-header">🔗 衍生詞家族變化</div>
        ${(lesson.family||[]).map(createFamilyCard).join('')}
      </div>`;
    con.appendChild(div);
  });

  // Attach TTS listeners using data attributes — avoids all HTML quoting issues
  document.addEventListener('click', function(e) {
    const btn = e.target.closest('.tts-word, .tts-ex, .tts-en');
    if (!btn) return;
    // decode HTML entities back to plain text for speech
    const tmp = document.createElement('textarea');
    tmp.innerHTML = btn.dataset.text || '';
    speak(tmp.value, btn);
  });
}

render();

function showLesson(key, clickedBtn) {
  document.querySelectorAll('.lesson-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lesson-'+key.replace(/ /g,'-')).classList.add('active');
  clickedBtn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if(curU){window.speechSynthesis.cancel();if(curB){curB.classList.remove('playing');curB.textContent=curB._orig;}curU=null;curB=null;}
}
</script>
</body>
</html>
